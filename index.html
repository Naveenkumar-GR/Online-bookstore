<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Bookstore</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1><a href="/">📚 Online Bookstore</a></h1>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/cart" class="cart-link">🛒 Cart (<span id="cart-count">0</span>)</a></li>
            </ul>
        </div>
    </nav>

    <!-- Search Bar -->
    <div class="search-section">
        <div class="container">
            <input type="text" id="searchInput" placeholder="Search books by title..." class="search-box">
            <button onclick="searchBooks()" class="search-btn">Search</button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container">
        <section class="books-section">
            <h2>Available Books</h2>
            <div class="books-grid" id="booksContainer">
                <!-- Books will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Online Bookstore. All rights reserved.</p>
    </footer>

    <script src="/js/main.js"></script>
</body>
</html>
