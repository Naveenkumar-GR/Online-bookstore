<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Online Bookstore</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1><a href="/">📚 Online Bookstore</a></h1>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/cart" class="cart-link">🛒 Cart</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <section class="checkout-section">
            <h2>Checkout</h2>
            
            <div class="checkout-container">
                <div class="order-review">
                    <h3>Order Review</h3>
                    <div id="orderItems"></div>
                    <h4>Total: $<span id="orderTotal">0.00</span></h4>
                </div>
                
                <form id="checkoutForm" class="checkout-form">
                    <h3>Shipping Information</h3>
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email" required>
                    <input type="text" placeholder="Address" required>
                    <input type="text" placeholder="City" required>
                    <input type="text" placeholder="Zip Code" required>
                    
                    <h3>Payment Information</h3>
                    <input type="text" placeholder="Card Number" maxlength="16" required>
                    <input type="text" placeholder="MM/YY" maxlength="5" required>
                    <input type="text" placeholder="CVV" maxlength="3" required>
                    
                    <button type="submit" class="submit-btn">Place Order</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Online Bookstore. All rights reserved.</p>
    </footer>

    <script src="/js/checkout.js"></script>
</body>
</html>
